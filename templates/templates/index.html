<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Panel | مدیریت پیشرفته</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- نوار بالا -->
        <nav class="navbar navbar-dark bg-dark px-4">
            <span class="navbar-brand">
                <i class="bi bi-speedometer2"></i> X-Panel
            </span>
            <div>
                <span id="userInfo" class="text-light me-3">👤 ادمین</span>
                <button class="btn btn-outline-danger btn-sm" onclick="logout()">
                    <i class="bi bi-box-arrow-right"></i> خروج
                </button>
            </div>
        </nav>

        <!-- محتوا -->
        <div class="container-fluid mt-4">
            <div class="row">
                <!-- کارت‌های آمار -->
                <div class="col-md-3">
                    <div class="card stat-card bg-primary text-white">
                        <div class="card-body">
                            <h5 class="card-title">کاربران کل</h5>
                            <h2 id="totalUsers">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card bg-success text-white">
                        <div class="card-body">
                            <h5 class="card-title">کاربران فعال</h5>
                            <h2 id="activeUsers">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card bg-warning text-white">
                        <div class="card-body">
                            <h5 class="card-title">ترافیک کل</h5>
                            <h2 id="totalTraffic">0 GB</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card bg-info text-white">
                        <div class="card-body">
                            <h5 class="card-title">اینباندها</h5>
                            <h2 id="inboundsCount">0</h2>
                        </div>
                    </div>
                </div>
            </div>

            <!-- جدول کاربران -->
            <div class="card mt-4">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-people"></i> لیست کاربران</span>
                    <button class="btn btn-primary btn-sm" onclick="showAddUserModal()">
                        <i class="bi bi-plus-lg"></i> افزودن کاربر
                    </button>
                </div>
                <div class="card-body">
                    <table class="table table-hover" id="usersTable">
                        <thead>
                            <tr>
                                <th>نام</th>
                                <th>ترافیک مصرفی</th>
                                <th>محدودیت</th>
                                <th>انقضا</th>
                                <th>وضعیت</th>
                                <th>عملیات</th>
                            </tr>
                        </thead>
                        <tbody id="usersBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- مودال افزودن کاربر -->
    <div class="modal fade" id="addUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">افزودن کاربر جدید</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addUserForm">
                        <div class="mb-3">
                            <label>نام کاربر</label>
                            <input type="text" class="form-control" id="userName" required>
                        </div>
                        <div class="mb-3">
                            <label>ترافیک (GB)</label>
                            <input type="number" class="form-control" id="userTraffic" value="10" required>
                        </div>
                        <div class="mb-3">
                            <label>روز اعتبار</label>
                            <input type="number" class="form-control" id="userDays" value="30" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">لغو</button>
                    <button type="button" class="btn btn-primary" onclick="addUser()">افزودن</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.socket.io/4.7.0/socket.io.min.js"></script>
    <script src="/static/script.js"></script>
</body>
  </html>
